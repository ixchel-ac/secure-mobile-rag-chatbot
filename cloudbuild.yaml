steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.fly'
      - '-t'
      - 'us-west2-docker.pkg.dev/mobile-rag-fw/mobile-rag-fw/backend:latest'
      - '.'
images:
  - 'us-west2-docker.pkg.dev/mobile-rag-fw/mobile-rag-fw/backend:latest'
timeout: 1800s
options:
  machineType: 'E2_HIGHCPU_8'